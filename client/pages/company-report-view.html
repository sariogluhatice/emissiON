<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rapor Görüntüle – emissiON</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
    <link rel="icon" type="image/png" href="../assets/favicon.png" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <div class="main-content">
        <header class="topbar" id="topbar"></header>

        <main class="page-body">
          <div class="page-header">
            <div>
              <h1 id="crvTitle">Rapor Görüntüle</h1>
              <p id="crvSubtitle">Paylaşılan simülasyon raporu</p>
            </div>
            <div style="display:flex;align-items:center;gap:var(--spacing-sm);">
              <span style="font-size:12px;font-weight:700;padding:4px 12px;border-radius:99px;
                           background:#f59e0b20;color:#b45309;border:1px solid #f59e0b40;">
                Salt Okunur
              </span>
              <a href="company-reports.html" class="btn-secondary btn-nowrap">← Geri Dön</a>
            </div>
          </div>

          <!-- Loading / error states -->
          <div id="crvLoading" class="hh-loading">Rapor yükleniyor…</div>
          <div id="crvError" style="display:none;"></div>

          <!-- Report content -->
          <div id="crvContent" style="display:none;">

            <!-- Read-only banner -->
            <div style="padding:12px 16px;background:#f59e0b12;border:1px solid #f59e0b40;
                        border-radius:var(--radius-md);font-size:13px;margin-bottom:var(--spacing-lg);
                        display:flex;align-items:center;gap:10px;">
              <span style="font-size:18px;">👁</span>
              <span>Bu rapor salt okunur modda görüntülenmektedir. Raporun içeriği değiştirilemez.</span>
            </div>

            <!-- Meta info card -->
            <div class="content-card glass-card mb-lg">
              <div class="content-card-header">
                <span class="content-card-title">Rapor Bilgileri</span>
                <code id="crvReportNo" style="font-size:13px;background:var(--color-surface-alt,#f3f4f6);
                                              padding:2px 8px;border-radius:4px;"></code>
              </div>
              <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--spacing-md);">
                <div>
                  <div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;
                              color:var(--color-text-muted);margin-bottom:4px;">Senaryo Adı</div>
                  <div id="crvName" style="font-weight:600;"></div>
                </div>
                <div>
                  <div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;
                              color:var(--color-text-muted);margin-bottom:4px;">Rapor Sahibi</div>
                  <div id="crvOwner" style="font-weight:600;"></div>
                </div>
                <div>
                  <div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;
                              color:var(--color-text-muted);margin-bottom:4px;">Oluşturulma Tarihi</div>
                  <div id="crvCreatedAt" style="font-weight:600;"></div>
                </div>
              </div>
            </div>

            <!-- Two column: Inputs + Results -->
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:var(--spacing-lg);">

              <!-- Simulation inputs -->
              <div class="content-card glass-card">
                <div class="content-card-header">
                  <span class="content-card-title">Senaryo Girdileri</span>
                </div>
                <div id="crvInputs" style="display:flex;flex-direction:column;gap:var(--spacing-sm);"></div>
              </div>

              <!-- Simulation results -->
              <div class="content-card glass-card">
                <div class="content-card-header">
                  <span class="content-card-title">Senaryo Sonuçları</span>
                </div>
                <div id="crvResults" style="display:flex;flex-direction:column;gap:var(--spacing-sm);"></div>
              </div>

            </div>

          </div>
          <!-- end #crvContent -->

        </main>
      </div>
    </div>

    <script type="module" src="../js/company-report-view.js"></script>
  </body>
</html>
