<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rapor Görüntüle – emissiON</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
    <link rel="icon" type="image/png" href="../assets/favicon.png" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <div class="main-content">
        <header class="topbar" id="topbar"></header>

        <main class="page-body">
          <div class="page-header">
            <div>
              <h1 id="crvTitle">Rapor Görüntüle</h1>
              <p id="crvSubtitle">Şirket emisyon raporu</p>
            </div>
            <div style="display:flex;align-items:center;gap:var(--spacing-sm);flex-wrap:wrap;">
              <span style="font-size:12px;font-weight:700;padding:4px 12px;border-radius:99px;
                           background:#f59e0b20;color:#b45309;border:1px solid #f59e0b40;">
                Salt Okunur
              </span>
              <button id="crvDownloadPdfBtn" class="btn-secondary btn-nowrap" style="display:none;">
                ↓ PDF İndir
              </button>
              <a href="company-reports.html" class="btn-secondary btn-nowrap">← Geri Dön</a>
            </div>
          </div>

          <div id="crvLoading" class="hh-loading">Rapor yükleniyor…</div>
          <div id="crvError" style="display:none;"></div>

          <div id="crvContent" style="display:none;">

            <!-- Read-only banner -->
            <div style="padding:12px 16px;background:#f59e0b12;border:1px solid #f59e0b40;
                        border-radius:var(--radius-md);font-size:13px;margin-bottom:var(--spacing-lg);
                        display:flex;align-items:center;gap:10px;">
              <span>Bu rapor, oluşturulma anındaki verilerin değişmez anlık görüntüsüdür.</span>
            </div>

            <!-- Meta + Compliance -->
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:var(--spacing-lg);margin-bottom:var(--spacing-lg);">

              <div class="content-card glass-card">
                <div class="content-card-header">
                  <span class="content-card-title">Rapor Bilgileri</span>
                  <code id="crvReportNo" style="font-size:13px;background:var(--color-surface-alt,#f3f4f6);
                                                padding:2px 8px;border-radius:4px;"></code>
                </div>
                <div id="crvMeta" style="display:flex;flex-direction:column;gap:var(--spacing-xs);"></div>
              </div>

              <div class="content-card glass-card">
                <div class="content-card-header">
                  <span class="content-card-title">Şirket Profili</span>
                </div>
                <div id="crvCompany" style="display:flex;flex-direction:column;gap:var(--spacing-xs);"></div>
              </div>

            </div>

            <!-- Emission summary -->
            <div class="content-card glass-card mb-lg">
              <div class="content-card-header">
                <span class="content-card-title">Emisyon Özeti</span>
                <span id="crvRiskBadge"></span>
              </div>
              <div id="crvEmissionSummary" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--spacing-md);"></div>
            </div>

            <!-- Category breakdown + CBAM side by side -->
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:var(--spacing-lg);margin-bottom:var(--spacing-lg);">

              <div class="content-card glass-card">
                <div class="content-card-header">
                  <span class="content-card-title">Kategori Dağılımı</span>
                </div>
                <div id="crvCategories"></div>
              </div>

              <div class="content-card glass-card">
                <div class="content-card-header">
                  <span class="content-card-title">CBAM Özeti</span>
                </div>
                <div id="crvCbam"></div>
              </div>

            </div>

            <!-- Monthly trend -->
            <div class="content-card glass-card mb-lg">
              <div class="content-card-header">
                <span class="content-card-title">Aylık Emisyon Trendi</span>
              </div>
              <div id="crvTrend" style="overflow-x:auto;"></div>
            </div>

            <!-- Task summary + Compliance -->
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:var(--spacing-lg);">

              <div class="content-card glass-card">
                <div class="content-card-header">
                  <span class="content-card-title">Görev Tamamlama</span>
                </div>
                <div id="crvTasks"></div>
              </div>

              <div class="content-card glass-card">
                <div class="content-card-header">
                  <span class="content-card-title">Uyum Skoru</span>
                </div>
                <div id="crvCompliance"></div>
              </div>

            </div>

          </div>
          <!-- end #crvContent -->

        </main>
      </div>
    </div>

    <script type="module" src="../js/company-report-view.js"></script>
  </body>
</html>
