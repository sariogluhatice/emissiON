<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Record – EMISSON</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div class="record-form-page">
      <div class="record-form-card">
        <a href="dashboard.html" class="record-form-back">← Back to Dashboard</a>
        <h1 class="record-form-title" id="formTitle">New Record</h1>

        <form id="recordForm" novalidate>

          <!-- Source -->
          <div class="form-group">
            <label class="label" for="source">Source</label>
            <input
              class="input"
              type="text"
              id="source"
              placeholder="e.g. Transportation, Electricity"
            />
            <span class="error-msg" id="sourceError"></span>
          </div>

          <!-- Amount -->
          <div class="form-group">
            <label class="label" for="amount">Amount (kg CO₂)</label>
            <input
              class="input"
              type="number"
              id="amount"
              placeholder="e.g. 12.5"
              min="0.01"
              step="0.01"
            />
            <span class="error-msg" id="amountError"></span>
          </div>

          <!-- Date -->
          <div class="form-group">
            <label class="label" for="date">Date</label>
            <input
              class="input"
              type="date"
              id="date"
            />
            <span class="error-msg" id="dateError"></span>
          </div>

          <!-- API message -->
          <p class="api-message" id="apiMessage"></p>

          <!-- Submit -->
          <button type="submit" class="btn-primary" id="submitBtn">Save Record</button>
        </form>
      </div>
    </div>

    <script type="module" src="../js/record-form.js"></script>
  </body>
</html>
