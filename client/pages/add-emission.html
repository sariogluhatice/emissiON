<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Emission – EmissiON</title>
    <meta name="description" content="Log a new carbon emission entry." />
    <!-- Global CSS -->
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div class="app-shell">

      <!-- Sidebar (Yan Menü) -->
      <aside class="sidebar">
        <div class="sidebar-brand">EMISSON</div>
        <nav class="sidebar-nav">
          <a href="dashboard.html"     class="nav-item" id="nav-dashboard">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Dashboard
          </a>
          <a href="emissions.html"     class="nav-item" id="nav-emissions">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
            My Emissions
          </a>
          <a href="profile.html"       class="nav-item" id="nav-profile">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            Profile
          </a>
        </nav>
        <div class="sidebar-footer">
          <button class="btn-logout" id="logoutBtn">Log out</button>
        </div>
      </aside>

      <!-- Ana İçerik Alanı -->
      <div class="main-content">
        <header class="topbar">
          <span class="topbar-title">Add Emission Entry</span>
          <div class="topbar-user">
            <div class="user-avatar" id="userInitials">?</div>
            <span id="userName">Loading…</span>
          </div>
        </header>

        <main class="page-body">
          <div class="page-header">
            <h1 id="pageTitle">Log a New Emission</h1>
            <p id="pageDesc">Enter your daily activities to track your carbon footprint.</p>
          </div>

          <div class="content-card" style="max-width:620px;">
            <form id="addEmissionForm" novalidate>

              <!-- 1. Kategori Seçimi -->
              <div class="form-group">
                <label class="label" for="category">Source / Category</label>
                <select class="input" id="category" name="category">
                  <option value="">Select a category…</option>
                  <option value="Transport">🚗 Transport</option>
                  <option value="Energy">⚡ Energy</option>
                  <option value="Flight">✈️ Flight</option>
                  <option value="Other">📦 Other</option>
                </select>
                <span class="error-msg" id="categoryError"></span>
              </div>

              <!-- 2. Akıllı Form Blokları -->
              <div id="climatiqBox" class="climatiq-box" style="display:none;">
                <div class="calc-title">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                  Climatiq Smart Assistant
                </div>

                <!-- Blok A: Standart Hesaplama (Enerji, Ulaşım vb.) -->
                <div id="standardBlock">
                  <div class="form-group">
                    <label class="label" for="activity">Activity Type</label>
                    <select class="input" id="activity" name="activity">
                      <option value="">Select an activity…</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label class="label" for="quantity">Quantity</label>
                    <div style="display:flex; gap:8px;">
                      <input class="input" type="number" id="quantity" name="quantity" placeholder="0.00" step="any" style="flex:1;" />
                      <div class="unit-badge" id="unitLabel">units</div>
                    </div>
                  </div>
                </div>

                <!-- Blok B: Uçuş Rotası Hesaplama -->
                <div id="flightBlock" style="display:none;">
                  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
                    <div class="form-group">
                      <label class="label" for="origin">From (City or IATA)</label>
                      <input class="input" type="text" id="origin" name="origin" placeholder="e.g. IST or Istanbul" />
                    </div>
                    <div class="form-group">
                      <label class="label" for="destination">To (City or IATA)</label>
                      <input class="input" type="text" id="destination" name="destination" placeholder="e.g. LHR or London" />
                    </div>
                  </div>
                </div>

                <div id="calcStatus" class="calc-status"></div>
              </div>

              <!-- 3. Nihai Miktar (Sonuç) -->
              <div class="form-group" style="margin-top: 10px;">
                <label class="label" for="amount" style="font-weight: 700; color: var(--color-primary);">Calculated Carbon Footprint</label>
                <div style="position: relative;">
                  <input class="input" type="number" id="amount" name="amount" placeholder="Scientific estimate will appear here..." min="0.01" step="any" />
                  <span style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 11px; font-weight: 700; color: var(--color-text-muted); pointer-events: none;">kg CO₂e</span>
                </div>
                <span class="error-msg" id="amountError"></span>
              </div>

              <!-- AI İçgörü Kutusu (AI Insight Box) -->
              <div id="aiInsightBox" class="ai-insight-box" style="display:none;">
                <div class="ai-box-header">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sparkle-icon"><path d="M12 3l1.91 5.81L21 9l-5.81 1.91L12 21l-1.91-5.81L3 15l5.81-1.91z"/></svg>
                  <span>AI Digital Twin Insight</span>
                </div>
                <p id="aiInsightText" class="ai-insight-text"></p>
              </div>

              <!-- 4. Tarih -->
              <div class="form-group">
                <label class="label" for="date">Date</label>
                <input class="input" type="date" id="date" name="date" />
                <span class="error-msg" id="dateError"></span>
              </div>

              <div style="display:flex;gap:16px;margin-top:24px;">
                <button type="submit" class="btn-primary" id="submitBtn" style="flex:1;">Save Entry</button>
                <a href="dashboard.html" class="btn-secondary" style="flex:1; text-align:center;">Cancel</a>
              </div>
            </form>
          </div>
        </main>
      </div>
    </div>

    <!-- Form mantığını yöneten JS modülü -->
    <script type="module" src="../js/add-emission.js"></script>
  </body>
</html>
