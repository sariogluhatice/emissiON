<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-posta Doğrulama – emissiON</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="icon" type="image/png" href="../assets/favicon.png" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-card">
        <!-- Left Panel -->
        <div class="auth-left">
          <div class="auth-brand">emissiON</div>
          <h1 class="auth-heading">E-posta Adresinizi Doğrulayın</h1>

          <form id="verifyForm" novalidate>
            <!-- Email -->
            <div class="form-group">
              <label class="label" for="email">E-posta</label>
              <input
                class="input"
                type="email"
                id="email"
                placeholder="E-posta adresinizi girin"
                autocomplete="email"
              />
              <span class="error-msg" id="emailError"></span>
            </div>

            <!-- Verification Code -->
            <div class="form-group">
              <label class="label" for="code">Doğrulama Kodu</label>
              <input
                class="input"
                type="text"
                id="code"
                placeholder="6 haneli kodu girin"
                inputmode="numeric"
                maxlength="6"
                autocomplete="one-time-code"
              />
              <span class="error-msg" id="codeError"></span>
            </div>

            <!-- Timer -->
            <div id="timerBox" style="display:flex;align-items:center;gap:8px;
                 background:var(--color-surface-muted);border-radius:var(--radius-md);
                 padding:10px 14px;margin-bottom:4px;">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" style="flex-shrink:0;color:var(--color-text-muted);">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
              <span style="font-size:13px;color:var(--color-text-muted);">Kod geçerlilik süresi:</span>
              <strong id="timerDisplay" style="font-size:13px;color:var(--color-primary);min-width:36px;">120s</strong>
            </div>

            <!-- API message -->
            <p class="api-message" id="apiMessage"></p>

            <!-- Verify button -->
            <button type="submit" class="btn-primary" id="submitBtn">
              E-postayı Doğrula
            </button>

            <!-- Resend code — disabled until timer reaches 0 -->
            <button type="button" class="btn-secondary" id="resendBtn" disabled>
              Yeni Kod Gönder
            </button>

            <!-- Back to login -->
            <p class="bottom-text">
              Zaten doğruladınız mı? <a href="login.html">Giriş Yap</a>
            </p>
          </form>
        </div>

        <!-- Right Panel -->
        <div class="auth-right"></div>
      </div>
    </main>

    <script type="module" src="../js/verify-email.js"></script>
  </body>
</html>
