<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-posta Doğrulama – emissiON</title>
    <style>
      html,
      body {
        background: #07090b;
        color: #ffffff;
      }
    </style>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-card">
        <!-- Left Panel -->
        <div class="auth-left">
          <div class="auth-brand">emissiON</div>
          <h1 class="auth-heading">E-posta Adresinizi Doğrulayın</h1>

          <form id="verifyForm" novalidate>
            <!-- Email -->
            <div class="form-group">
              <label class="label" for="email">E-posta</label>
              <input
                class="input"
                type="email"
                id="email"
                placeholder="E-posta adresinizi girin"
                autocomplete="email"
              />
              <span class="error-msg" id="emailError"></span>
            </div>

            <!-- Verification Code -->
            <div class="form-group">
              <label class="label" for="code">Doğrulama Kodu</label>
              <input
                class="input"
                type="text"
                id="code"
                placeholder="6 haneli kodu girin"
                inputmode="numeric"
                maxlength="6"
                autocomplete="one-time-code"
              />
              <span class="error-msg" id="codeError"></span>
            </div>

            <!-- API message -->
            <p class="api-message" id="apiMessage"></p>

            <!-- Verify button -->
            <button type="submit" class="btn-primary" id="submitBtn">
              E-postayı Doğrula
            </button>

            <!-- Resend code -->
            <button type="button" class="btn-secondary" id="resendBtn">
              Kodu Yeniden Gönder
            </button>

            <!-- Back to login -->
            <p class="bottom-text">
              Zaten doğruladınız mı? <a href="login.html">Giriş Yap</a>
            </p>
          </form>
        </div>

        <!-- Right Panel -->
        <div class="auth-right"></div>
      </div>
    </main>

    <script type="module" src="../js/verify-email.js"></script>
  </body>
</html>
