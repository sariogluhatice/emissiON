<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register – EMISSON</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-card">
        <!-- Left Panel -->
        <div class="auth-left">
          <div class="auth-brand">EMISSON</div>
          <h1 class="auth-heading">Create an Account</h1>

          <form id="registerForm" novalidate>
            <!-- Full Name -->
            <div class="form-group">
              <label class="label" for="name">Full Name</label>
              <input
                class="input"
                type="text"
                id="name"
                placeholder="Enter your full name"
                autocomplete="name"
              />
              <span class="error-msg" id="nameError"></span>
            </div>

            <!-- Email -->
            <div class="form-group">
              <label class="label" for="email">Email</label>
              <input
                class="input"
                type="email"
                id="email"
                placeholder="Enter your email"
                autocomplete="email"
              />
              <span class="error-msg" id="emailError"></span>
            </div>

            <!-- Password -->
            <div class="form-group">
              <label class="label" for="password">Password</label>
              <input
                class="input"
                type="password"
                id="password"
                placeholder="Create a password"
                autocomplete="new-password"
              />
              <span class="error-msg" id="passwordError"></span>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
              <label class="label" for="confirmPassword"
                >Confirm Password</label
              >
              <input
                class="input"
                type="password"
                id="confirmPassword"
                placeholder="Confirm your password"
                autocomplete="new-password"
              />
              <span class="error-msg" id="confirmPasswordError"></span>
            </div>

            <!-- API mesajı (hata / başarı) -->
            <p class="api-message" id="apiMessage"></p>

            <!-- Submit -->
            <button type="submit" class="btn-primary" id="submitBtn">Register</button>

            <!-- Login link -->
            <p class="bottom-text">
              Already have an account? <a href="login.html">Login</a>
            </p>
          </form>
        </div>

        <!-- Right Panel -->
        <div class="auth-right"></div>
      </div>
    </main>

    <script type="module" src="../js/register.js"></script>
  </body>
</html>
