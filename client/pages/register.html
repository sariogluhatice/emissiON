<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kayıt – emissiON</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="icon" type="image/png" href="../assets/favicon.png" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-card">
        <!-- Left Panel -->
        <div class="auth-left">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 40px;
            "
          >
            <a
              href="../index.html"
              class="auth-brand"
              style="text-decoration: none; margin-bottom: 0"
              >emissiON</a
            >
          </div>
          <h1 class="auth-heading">Aramıza Katıl</h1>

          <form id="registerForm" novalidate>
            <!-- Full Name -->
            <div class="form-group">
              <label class="label" for="name">Tam Adınız</label>
              <input
                class="input"
                type="text"
                id="name"
                placeholder="Adınızı ve soyadınızı girin"
                autocomplete="name"
              />
              <span class="error-msg" id="nameError"></span>
            </div>

            <!-- Account Type -->
            <div class="form-group">
              <label class="label" for="role">Hesap Türü</label>
              <select class="input" id="role">
                <option value="individual">Birey</option>
                <option value="household">Hane</option>
                <option value="company">Şirket</option>
              </select>
            </div>

            <!-- Household intent (visible only when Hane is selected) -->
            <div class="form-group" id="householdIntentGroup" style="display:none;">
              <label class="label">Hane Hesabı Türü</label>
              <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px;">
                <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;color:var(--color-text);">
                  <input type="radio" name="householdIntent" value="create" checked
                    style="width:16px;height:16px;accent-color:var(--color-primary);flex-shrink:0;" />
                  <span>Yeni hane oluşturacağım <span style="display:block;font-size:12px;color:var(--color-text-muted);">Yönetici olarak hane kurun, üyeleri davet edin.</span></span>
                </label>
                <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;color:var(--color-text);">
                  <input type="radio" name="householdIntent" value="join"
                    style="width:16px;height:16px;accent-color:var(--color-primary);flex-shrink:0;" />
                  <span>Davet kodum var, mevcut haneye katılacağım <span style="display:block;font-size:12px;color:var(--color-text-muted);">Yöneticinin size verdiği davet kodunu girin.</span></span>
                </label>
              </div>

              <!-- Invite code input — shown only when "join" is selected -->
              <div id="inviteCodeGroup" style="display:none;margin-top:12px;padding-left:26px;">
                <label class="label" for="regInviteCode" style="font-size:13px;margin-bottom:4px;">
                  Davet Kodu <span style="color:var(--color-error)">*</span>
                </label>
                <input class="input" type="text" id="regInviteCode"
                  placeholder="Örn: A1B2C3D4"
                  maxlength="20"
                  autocomplete="off"
                  style="text-transform:uppercase;letter-spacing:2px;font-weight:700;" />
                <span class="error-msg" id="inviteCodeError"></span>
              </div>
            </div>

            <!-- Email -->
            <div class="form-group">
              <label class="label" for="email">E-posta</label>
              <input
                class="input"
                type="email"
                id="email"
                placeholder="E-posta adresinizi girin"
                autocomplete="email"
              />
              <span class="error-msg" id="emailError"></span>
            </div>

            <!-- Password -->
            <div class="form-group">
              <label class="label" for="password">Parola</label>
              <div class="password-wrapper">
                <input
                  class="input"
                  type="password"
                  id="password"
                  placeholder="Parola oluşturun"
                  autocomplete="new-password"
                />
                <button type="button" class="password-toggle-btn" data-target="password" aria-label="Parolayı göster">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <span class="error-msg" id="passwordError"></span>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
              <label class="label" for="confirmPassword">Parolayı Onayla</label>
              <div class="password-wrapper">
                <input
                  class="input"
                  type="password"
                  id="confirmPassword"
                  placeholder="Parolanızı onaylayın"
                  autocomplete="new-password"
                />
                <button type="button" class="password-toggle-btn" data-target="confirmPassword" aria-label="Parolayı göster">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <span class="error-msg" id="confirmPasswordError"></span>
            </div>

            <!-- API mesajı -->
            <p class="api-message" id="apiMessage"></p>

            <button type="submit" class="btn-primary" id="submitBtn">
              Hesabı Oluştur
            </button>

            <p class="bottom-text">
              Zaten üye misin? <a href="login.html">Giriş Yap</a>
            </p>
          </form>
        </div>

        <!-- Right Panel -->
        <div class="auth-right">
          <div class="globe-wrapper">
            <div class="globe-inner">
              <img
                src="../assets/halfglobe.png"
                alt="EmissiON İkili Dünya Simülasyonu"
                class="auth-visual-img"
              />
            </div>
          </div>
          <div class="auth-visual-content">
            <h2>Hangi Dünyayı Seçersin?</h2>
            <p>
              Bugün attığın her adım, yarının simülasyonunu değiştirir. Aramıza
              katıl ve değişimi başlat.
            </p>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="../js/register.js"></script>
    <script>
      document.querySelectorAll('.password-toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const input = document.getElementById(btn.dataset.target);
          if (!input) return;
          const isHidden = input.type === 'password';
          input.type = isHidden ? 'text' : 'password';
          btn.setAttribute('aria-label', isHidden ? 'Parolayı gizle' : 'Parolayı göster');
          btn.querySelector('svg').innerHTML = isHidden
            ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
            : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        });
      });
    </script>
  </body>
</html>
