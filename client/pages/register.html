<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kayıt – EMISSON</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-card">
        <!-- Left Panel -->
        <div class="auth-left">
          <div class="auth-brand">EMISSON</div>
          <h1 class="auth-heading">Hesap Oluştur</h1>

          <form id="registerForm" novalidate>
            <!-- Full Name -->
            <div class="form-group">
              <label class="label" for="name">Ad Soyad</label>
              <input
                class="input"
                type="text"
                id="name"
                placeholder="Adınızı ve soyadınızı girin"
                autocomplete="name"
              />
              <span class="error-msg" id="nameError"></span>
            </div>

            <!-- Account Type -->
            <div class="form-group">
              <label class="label" for="role">Hesap Türü</label>
              <select class="input" id="role">
                <option value="individual">Birey</option>
                <option value="household">Hane</option>
                <option value="company">Şirket</option>
              </select>
            </div>

            <!-- Email -->
            <div class="form-group">
              <label class="label" for="email">E-posta</label>
              <input
                class="input"
                type="email"
                id="email"
                placeholder="E-posta adresinizi girin"
                autocomplete="email"
              />
              <span class="error-msg" id="emailError"></span>
            </div>

            <!-- Password -->
            <div class="form-group">
              <label class="label" for="password">Parola</label>
              <input
                class="input"
                type="password"
                id="password"
                placeholder="Parola oluşturun"
                autocomplete="new-password"
              />
              <span class="error-msg" id="passwordError"></span>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
              <label class="label" for="confirmPassword">Parolayı Onayla</label>
              <input
                class="input"
                type="password"
                id="confirmPassword"
                placeholder="Parolanızı onaylayın"
                autocomplete="new-password"
              />
              <span class="error-msg" id="confirmPasswordError"></span>
            </div>

            <!-- API mesajı (hata / başarı) -->
            <p class="api-message" id="apiMessage"></p>

            <!-- Submit -->
            <button type="submit" class="btn-primary" id="submitBtn">
              Kayıt Ol
            </button>

            <!-- Login link -->
            <p class="bottom-text">
              Zaten hesabınız var mı? <a href="login.html">Giriş Yap</a>
            </p>
          </form>
        </div>

        <!-- Right Panel -->
        <div class="auth-right"></div>
      </div>
    </main>

    <script type="module" src="../js/register.js"></script>
  </body>
</html>
