<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil – emissiON</title>
    <style>
      html,
      body {
        background: #07090b;
        color: #ffffff;
      }
    </style>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <div class="main-content">
        <div class="bg-decorative-element">
          <img
            src="../assets/login-visual.png"
            alt="Profil Simülasyonu"
            style="opacity: 0.1; filter: blur(30px)"
          />
        </div>

        <header class="topbar" id="topbar"></header>

        <main class="page-body">
          <div class="page-header">
            <h1>Profilim</h1>
            <p>Hesap detaylarınız ve kişisel karbon ayak izi simülasyonunuz.</p>
          </div>

          <div class="profile-grid">
            <!-- Sol Panel -->
            <div class="profile-identity-card glass-card">
              <div class="profile-avatar-circle" id="profileAvatar">?</div>
              <div class="profile-name" id="profileName">—</div>
              <div class="profile-email" id="profileEmail">—</div>
              <span class="profile-role-badge" id="profileRole">—</span>
              <div class="profile-since" id="profileSince">—</div>
              <div class="profile-ob-badge" id="obStatusBadge">—</div>
              <div class="profile-identity-actions">
                <a
                  href="settings.html"
                  class="btn-primary"
                  style="width: 100%; margin-bottom: 8px"
                  >Profili Düzenle</a
                >
                <a
                  href="carbon-profile.html"
                  class="btn-secondary"
                  style="width: 100%"
                  >Karbon Profilini Düzenle</a
                >
              </div>
            </div>

            <!-- Sağ Panel -->
            <div>
              <div class="content-card glass-card" style="margin-bottom: 24px">
                <div class="content-card-header">
                  <span class="content-card-title">Genel Bakış</span>
                </div>
                <div class="card-grid" style="margin-bottom: 0">
                  <div
                    class="stat-card glass-card"
                    style="border-left: 3px solid var(--color-primary)"
                  >
                    <span class="stat-label">Toplam Emisyon</span>
                    <span class="stat-value" id="profileStatTotal">—</span>
                    <span class="stat-unit">kg CO₂e</span>
                  </div>
                  <div
                    class="stat-card glass-card"
                    style="border-left: 3px solid var(--color-success)"
                  >
                    <span class="stat-label">Bu Ay</span>
                    <span class="stat-value" id="profileStatMonth">—</span>
                    <span class="stat-unit">kg CO₂e</span>
                  </div>
                  <div
                    class="stat-card glass-card"
                    style="border-left: 3px solid var(--color-text-muted)"
                  >
                    <span class="stat-label">Toplam Kayıt</span>
                    <span class="stat-value" id="profileStatEntries">—</span>
                    <span class="stat-unit">kayıt</span>
                  </div>
                </div>
              </div>

              <div id="carbonProfileContainer">
                <div
                  class="content-card glass-card"
                  style="text-align: center; padding: 48px; opacity: 0.6"
                >
                  Karbon profili verileri simülasyondan çekiliyor…
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="../js/profile.js"></script>
  </body>
</html>
