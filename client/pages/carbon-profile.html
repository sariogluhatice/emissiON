<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karbon Profilini Düzenle – emissiON</title>
    <style>
      html, body { background: #07090b; color: #ffffff; }
      .ob-field-wrapper { margin-bottom: 20px; }
      .ob-field-wrapper .label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: var(--color-text-muted, #a0aab4);
        margin-bottom: 8px;
      }
      .radio-group, .checkbox-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .radio-group input[type="radio"],
      .checkbox-group input[type="checkbox"] { display: none; }
      .radio-group label,
      .checkbox-group label {
        display: inline-flex;
        align-items: center;
        padding: 7px 14px;
        border: 1px solid var(--color-border, #2a2f36);
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        color: var(--color-text-muted, #a0aab4);
      }
      .radio-group input[type="radio"]:checked + label,
      .checkbox-group input[type="checkbox"]:checked + label {
        background: var(--color-primary, #00d27f);
        border-color: var(--color-primary, #00d27f);
        color: #000;
        font-weight: 600;
      }
      .radio-group label:hover,
      .checkbox-group label:hover {
        border-color: var(--color-primary, #00d27f);
      }
    </style>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <div class="main-content">
        <div class="bg-decorative-element">
          <img
            src="../assets/login-visual.png"
            alt="Karbon Profili"
            style="opacity: 0.1; filter: blur(30px)"
          />
        </div>

        <header class="topbar" id="topbar"></header>

        <main class="page-body">
          <div class="page-header">
            <h1>Karbon Profilini Düzenle</h1>
            <p>Onboarding testini tekrar çözmeden karbon verilerini güncelleyebilirsin.</p>
          </div>

          <div id="cpFormContainer">
            <div class="content-card glass-card" style="text-align:center;padding:48px;opacity:0.6">
              Veriler yükleniyor…
            </div>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="../js/carbon-profile.js"></script>
  </body>
</html>
