<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Şirket Görevleri – emissiON</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
    <link rel="icon" type="image/png" href="../assets/favicon.png" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <div class="main-content">
        <header class="topbar" id="topbar"></header>

        <main class="page-body">
          <div class="page-header">
            <div>
              <h1>Şirket Görevleri</h1>
              <p>Emisyon azaltım görevleri oluşturun ve ilerlemenizi otomatik takip edin.</p>
            </div>
            <div style="display:flex;gap:10px;align-items:center;">
              <a href="company.html" class="btn-secondary btn-nowrap">← Şirket Paneli</a>
              <a href="create-company-task.html" class="btn-primary btn-nowrap" id="newTaskBtn">
                + Yeni Görev
              </a>
            </div>
          </div>

          <!-- ── Filter tabs ────────────────────────────────────────────── -->
          <div class="hh-filter-bar" id="filterBar">
            <button class="hh-filter-btn active" data-filter="all">Tümü <span class="hh-filter-count" id="fcAll"></span></button>
            <button class="hh-filter-btn" data-filter="pending">Bekliyor <span class="hh-filter-count" id="fcPending"></span></button>
            <button class="hh-filter-btn" data-filter="in_progress">Devam Ediyor <span class="hh-filter-count" id="fcInProgress"></span></button>
            <button class="hh-filter-btn" data-filter="completed">Tamamlandı <span class="hh-filter-count" id="fcCompleted"></span></button>
            <button class="hh-filter-btn" data-filter="cancelled">İptal Edildi <span class="hh-filter-count" id="fcCancelled"></span></button>
          </div>

          <!-- ── Task cards grid ────────────────────────────────────────── -->
          <div id="ctTasksContainer">
            <div class="hh-loading">Yükleniyor…</div>
          </div>

        </main>
      </div>
    </div>

    <script type="module" src="../js/company-tasks.js"></script>
  </body>
</html>
