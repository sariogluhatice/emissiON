<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emisyonlarım – emissiON</title>
    <style>
      html,
      body {
        background: #07090b;
        color: #ffffff;
      }
    </style>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <div class="main-content">
        <div class="bg-decorative-element">
          <img
            src="../assets/login-visual.png"
            alt="Emisyon Geçmişi"
            style="opacity: 0.1; filter: blur(30px)"
          />
        </div>

        <header class="topbar" id="topbar"></header>

        <main class="page-body">
          <div class="page-header">
            <h1>Emisyon Kayıtlarım</h1>
            <p>Geçmiş aktivitelerinizi inceleyin, filtreleyin ve yönetin.</p>
          </div>

          <div class="content-card glass-card">
            <div class="table-actions">
              <input
                class="input"
                type="search"
                id="searchInput"
                placeholder="Kayıtlarda ara…"
                style="max-width: 300px"
              />
              <div style="display: flex; gap: 12px; align-items: center">
                <select
                  class="input"
                  id="categoryFilter"
                  style="width: auto; min-width: 160px"
                >
                  <option value="">Tüm Kategoriler</option>
                  <option value="Transport">Ulaşım</option>
                  <option value="Energy">Enerji</option>
                  <option value="Food">Gıda</option>
                  <option value="Shopping">Alışveriş</option>
                  <option value="Other">Diğer</option>
                </select>
              </div>
            </div>

            <div class="table-wrapper">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Tarih</th>
                    <th>Kategori</th>
                    <th>Açıklama</th>
                    <th>Miktar (kg CO₂e)</th>
                    <th>İşlemler</th>
                  </tr>
                </thead>
                <tbody id="emissionsTableBody">
                  <tr>
                    <td colspan="5" class="table-empty">
                      Kayıtlar yükleniyor…
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div
              style="
                padding: 12px 0 0;
                text-align: right;
                font-size: 13px;
                color: var(--color-text-muted);
              "
            >
              Toplam: <strong id="totalShown">0</strong> kayıt —
              <strong id="totalCO2">0</strong> kg CO₂e
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- Delete Modal -->
    <div id="deleteModal" class="modal-backdrop" style="display: none">
      <div class="modal-box glass-card">
        <h2 class="modal-title">Kaydı Sil</h2>
        <p class="modal-body">
          Bu emisyon kaydını kalıcı olarak silmek istediğinizden emin misiniz?
          Bu işlem geri alınamaz.
        </p>
        <div class="modal-actions">
          <button class="btn-secondary" id="cancelDeleteBtn">İptal</button>
          <button class="btn-danger" id="confirmDeleteBtn">Sil</button>
        </div>
      </div>
    </div>

    <script type="module" src="../js/emissions.js"></script>
  </body>
</html>
