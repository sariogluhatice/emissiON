<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hane Görevleri – emissiON</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
    <link rel="icon" type="image/png" href="../assets/favicon.png" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>

      <div class="main-content">
        <header class="topbar" id="topbar"></header>

        <main class="page-body">
          <div class="page-header">
            <div>
              <h1>Hane Görevleri</h1>
              <p id="pageSubtitle">Karbon azaltım görevlerini takip edin.</p>
            </div>
            <div style="display:flex;gap:10px;align-items:center;">
              <a href="household.html" class="btn-secondary btn-nowrap">← Hane Paneli</a>
              <!-- Shown only for admin via JS -->
              <a href="create-household-task.html" class="btn-primary btn-nowrap" id="newTaskBtn" style="display:none;">
                + Yeni Görev
              </a>
            </div>
          </div>

          <!-- ── Filter tabs ────────────────────────────────────────────── -->
          <div class="hh-filter-bar" id="filterBar" style="display:none;">
            <button class="hh-filter-btn active" data-filter="all">Tümü <span class="hh-filter-count" id="fcAll"></span></button>
            <button class="hh-filter-btn" data-filter="pending">Bekliyor <span class="hh-filter-count" id="fcPending"></span></button>
            <button class="hh-filter-btn" data-filter="in_progress">Devam Ediyor <span class="hh-filter-count" id="fcInProgress"></span></button>
            <button class="hh-filter-btn" data-filter="completed">Tamamlandı <span class="hh-filter-count" id="fcCompleted"></span></button>
            <button class="hh-filter-btn" data-filter="mine" id="filterMine" style="display:none;">Benim Görevlerim <span class="hh-filter-count" id="fcMine"></span></button>
          </div>

          <!-- ── Task cards grid ────────────────────────────────────────── -->
          <div id="tasksContainer">
            <div class="hh-loading">Yükleniyor…</div>
          </div>

        </main>
      </div>
    </div>

    <!-- ── Add-data modal ─────────────────────────────────────────────── -->
    <div id="addDataModal" class="modal-backdrop" style="display:none;">
      <div class="modal-box glass-card" style="max-width:460px;width:100%;">
        <h2 class="modal-title" id="addDataTitle"></h2>
        <p class="modal-body" id="addDataMsg"></p>
        <div class="modal-actions">
          <button class="btn-secondary" id="addDataCancel">İptal</button>
          <button class="btn-primary"   id="addDataConfirm">Kayıt Ekle</button>
        </div>
      </div>
    </div>

    <script type="module" src="../js/household-tasks.js"></script>
  </body>
</html>
