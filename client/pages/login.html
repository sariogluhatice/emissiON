<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giriş – emissiON</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-card">
        <!-- Left Panel -->
        <div class="auth-left">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 40px;
            "
          >
            <a
              href="../index.html"
              class="auth-brand"
              style="text-decoration: none; margin-bottom: 0"
              >emissiON</a
            >
          </div>
          <h1 class="auth-heading">Hoş Geldiniz</h1>

          <form id="loginForm" novalidate>
            <!-- Email -->
            <div class="form-group">
              <label class="label" for="email">E-posta</label>
              <input
                class="input"
                type="email"
                id="email"
                placeholder="E-posta adresinizi girin"
                autocomplete="email"
              />
              <span class="error-msg" id="emailError"></span>
            </div>

            <!-- Password -->
            <div class="form-group">
              <label class="label" for="password">Parola</label>
              <div class="password-wrapper">
                <input
                  class="input"
                  type="password"
                  id="password"
                  placeholder="Parolanızı girin"
                  autocomplete="current-password"
                />
                <button type="button" class="password-toggle-btn" data-target="password" aria-label="Parolayı göster">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <span class="error-msg" id="passwordError"></span>
            </div>

            <!-- Remember me + Forgot Password -->
            <div class="auth-row">
              <label class="checkbox-label">
                <input type="checkbox" id="rememberMe" />
                Beni hatırla
              </label>
              <button type="button" class="link-btn" id="forgotPasswordBtn">
                Parolayı mı unuttunuz?
              </button>
            </div>

            <!-- API mesajı -->
            <p class="api-message" id="apiMessage"></p>

            <button type="submit" class="btn-primary" id="submitBtn">
              Oturum Aç
            </button>
            <div>
              <p class="bottom-text">
                Henüz hesabın yok mu? <a href="register.html">Hemen Katıl</a>
              </p>
            </div>
          </form>
        </div>

        <!-- Right Panel -->
        <div class="auth-right">
          <div class="globe-wrapper">
            <div class="globe-inner">
              <img
                src="../assets/halfglobe.png"
                alt="Dünya Simülasyonu"
                class="auth-visual-img"
              />
            </div>
          </div>
          <div class="auth-visual-content">
            <h2>Dijital İkiz Analizi</h2>
            <p>
              Emisyon verilerini gerçek zamanlı bir simülasyona dönüştürerek
              gezegenin geleceğine yön ver.
            </p>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="../js/login.js"></script>
    <script>
      document.querySelectorAll('.password-toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const input = document.getElementById(btn.dataset.target);
          if (!input) return;
          const isHidden = input.type === 'password';
          input.type = isHidden ? 'text' : 'password';
          btn.setAttribute('aria-label', isHidden ? 'Parolayı gizle' : 'Parolayı göster');
          btn.querySelector('svg').innerHTML = isHidden
            ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
            : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        });
      });
    </script>
  </body>
</html>
