<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giriş – emissiON</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-card">
        <!-- Left Panel -->
        <div class="auth-left">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 40px;
            "
          >
            <a
              href="../index.html"
              class="auth-brand"
              style="text-decoration: none; margin-bottom: 0"
              >emissiON</a
            >
          </div>
          <h1 class="auth-heading">Hoş Geldiniz</h1>

          <form id="loginForm" novalidate>
            <!-- Email -->
            <div class="form-group">
              <label class="label" for="email">E-posta</label>
              <input
                class="input"
                type="email"
                id="email"
                placeholder="E-posta adresinizi girin"
                autocomplete="email"
              />
              <span class="error-msg" id="emailError"></span>
            </div>

            <!-- Password -->
            <div class="form-group">
              <label class="label" for="password">Parola</label>
              <input
                class="input"
                type="password"
                id="password"
                placeholder="Parolanızı girin"
                autocomplete="current-password"
              />
              <span class="error-msg" id="passwordError"></span>
            </div>

            <!-- Remember me + Forgot Password -->
            <div class="auth-row">
              <label class="checkbox-label">
                <input type="checkbox" id="rememberMe" />
                Beni hatırla
              </label>
              <button type="button" class="link-btn" id="forgotPasswordBtn">
                Parolayı mı unuttunuz?
              </button>
            </div>

            <!-- API mesajı -->
            <p class="api-message" id="apiMessage"></p>

            <button type="submit" class="btn-primary" id="submitBtn">
              Oturum Aç
            </button>
            <div>
              <p class="bottom-text">
                Henüz hesabın yok mu? <a href="register.html">Hemen Katıl</a>
              </p>
            </div>
          </form>
        </div>

        <!-- Right Panel -->
        <div class="auth-right">
          <div class="globe-wrapper">
            <div class="globe-inner">
              <img
                src="../assets/halfglobe.png"
                alt="Dünya Simülasyonu"
                class="auth-visual-img"
              />
            </div>
          </div>
          <div class="auth-visual-content">
            <h2>Dijital İkiz Analizi</h2>
            <p>
              Emisyon verilerini gerçek zamanlı bir simülasyona dönüştürerek
              gezegenin geleceğine yön ver.
            </p>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="../js/login.js"></script>
  </body>
</html>
