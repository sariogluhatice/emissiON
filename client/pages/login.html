<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giriş – EMISSON</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-card">
        <!-- Left Panel -->
        <div class="auth-left">
          <div class="auth-brand">EMISSON</div>
          <h1 class="auth-heading">EMISSON'a Giriş</h1>

          <form id="loginForm" novalidate>
            <!-- Email -->
            <div class="form-group">
              <label class="label" for="email">E-posta</label>
              <input
                class="input"
                type="email"
                id="email"
                placeholder="E-posta adresinizi girin"
                autocomplete="email"
              />
              <span class="error-msg" id="emailError"></span>
            </div>

            <!-- Password -->
            <div class="form-group">
              <label class="label" for="password">Parola</label>
              <input
                class="input"
                type="password"
                id="password"
                placeholder="Parolanızı girin"
                autocomplete="current-password"
              />
              <span class="error-msg" id="passwordError"></span>
            </div>

            <!-- Remember me + Forgot Password -->
            <div class="auth-row">
              <label class="checkbox-label">
                <input type="checkbox" id="rememberMe" />
                Beni hatırla
              </label>
              <button type="button" class="link-btn" id="forgotPasswordBtn">
                Parolayı mı unuttunuz?
              </button>
            </div>

            <!-- API mesajı (hata / başarı) -->
            <p class="api-message" id="apiMessage"></p>

            <!-- Submit -->
            <button type="submit" class="btn-primary" id="submitBtn">
              Giriş Yap
            </button>

            <!-- Register link -->
            <p class="bottom-text">
              Hesabınız yok mu? <a href="register.html">Kayıt Ol</a>
            </p>
          </form>
        </div>

        <!-- Right Panel -->
        <div class="auth-right"></div>
      </div>
    </main>

    <script type="module" src="../js/login.js"></script>
  </body>
</html>
