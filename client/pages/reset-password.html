<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parolayı Sıfırla – emissiON</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-card">
        <!-- Left Panel -->
        <div class="auth-left">
          <div class="auth-brand">emissiON</div>
          <h1 class="auth-heading">Yeni Parola Belirle</h1>

          <form id="resetForm" novalidate>
            <!-- New Password -->
            <div class="form-group">
              <label class="label" for="password">Yeni Parola</label>
              <input
                class="input"
                type="password"
                id="password"
                placeholder="Yeni parolayı girin"
                autocomplete="new-password"
              />
              <span class="error-msg" id="passwordError"></span>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
              <label class="label" for="confirmPassword">Parolayı Onayla</label>
              <input
                class="input"
                type="password"
                id="confirmPassword"
                placeholder="Yeni parolayı onaylayın"
                autocomplete="new-password"
              />
              <span class="error-msg" id="confirmPasswordError"></span>
            </div>

            <!-- API message -->
            <p class="api-message" id="apiMessage"></p>

            <!-- Submit -->
            <button type="submit" class="btn-primary" id="submitBtn">
              Parolayı Güncelle
            </button>

            <!-- Back to login -->
            <p class="bottom-text">
              <a href="login.html">Girişe Dön</a>
            </p>
          </form>
        </div>

        <!-- Right Panel -->
        <div class="auth-right"></div>
      </div>
    </main>

    <script type="module" src="../js/reset-password.js"></script>
  </body>
</html>
