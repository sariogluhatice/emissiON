<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parolayı Sıfırla – emissiON</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="icon" type="image/png" href="../assets/favicon.png" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-card">
        <!-- Left Panel -->
        <div class="auth-left">
          <div class="auth-brand">emissiON</div>
          <h1 class="auth-heading">Yeni Parola Belirle</h1>

          <form id="resetForm" novalidate>
            <!-- New Password -->
            <div class="form-group">
              <label class="label" for="password">Yeni Parola</label>
              <div class="password-wrapper">
                <input
                  class="input"
                  type="password"
                  id="password"
                  placeholder="Yeni parolayı girin"
                  autocomplete="new-password"
                />
                <button type="button" class="password-toggle-btn" data-target="password" aria-label="Parolayı göster">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <span class="error-msg" id="passwordError"></span>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
              <label class="label" for="confirmPassword">Parolayı Onayla</label>
              <div class="password-wrapper">
                <input
                  class="input"
                  type="password"
                  id="confirmPassword"
                  placeholder="Yeni parolayı onaylayın"
                  autocomplete="new-password"
                />
                <button type="button" class="password-toggle-btn" data-target="confirmPassword" aria-label="Parolayı göster">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <span class="error-msg" id="confirmPasswordError"></span>
            </div>

            <!-- API message -->
            <p class="api-message" id="apiMessage"></p>

            <!-- Submit -->
            <button type="submit" class="btn-primary" id="submitBtn">
              Parolayı Güncelle
            </button>

            <!-- Back to login -->
            <p class="bottom-text">
              <a href="login.html">Girişe Dön</a>
            </p>
          </form>
        </div>
      </div>
    </main>

    <script type="module" src="../js/reset-password.js"></script>
    <script>
      document.querySelectorAll('.password-toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const input = document.getElementById(btn.dataset.target);
          if (!input) return;
          const isHidden = input.type === 'password';
          input.type = isHidden ? 'text' : 'password';
          btn.setAttribute('aria-label', isHidden ? 'Parolayı gizle' : 'Parolayı göster');
          btn.querySelector('svg').innerHTML = isHidden
            ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
            : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        });
      });
    </script>
  </body>
</html>
