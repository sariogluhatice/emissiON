<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password – EMISSON</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-card">
        <!-- Left Panel -->
        <div class="auth-left">
          <div class="auth-brand">EMISSON</div>
          <h1 class="auth-heading">Reset Your Password</h1>

          <form id="forgotForm" novalidate>
            <!-- Email -->
            <div class="form-group">
              <label class="label" for="email">Email</label>
              <input
                class="input"
                type="email"
                id="email"
                placeholder="Enter your email"
                autocomplete="email"
              />
              <span class="error-msg" id="emailError"></span>
            </div>

            <!-- API message -->
            <p class="api-message" id="apiMessage"></p>

            <!-- Submit -->
            <button type="submit" class="btn-primary" id="submitBtn">Send Reset Link</button>

            <!-- Back to login -->
            <p class="bottom-text">
              Remembered your password? <a href="login.html">Login</a>
            </p>
          </form>
        </div>

        <!-- Right Panel -->
        <div class="auth-right"></div>
      </div>
    </main>

    <script type="module" src="../js/forgot-password.js"></script>
  </body>
</html>
