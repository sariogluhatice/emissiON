<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Smart Redirect: Check if user is already logged in
      const token = localStorage.getItem('emission_token');
      if (token) {
        window.location.replace('pages/dashboard.html');
      } else {
        window.location.replace('pages/login.html');
      }
    </script>
  </head>
  <body></body>
</html>
